meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands:
    - cd frontend
    - npm cache clean --force
    - npm install
    - npm run build
  artifacts:
    frontend/dist: /
run:
  command: cd frontend && npx serve -s dist
  persistenceMount: /data
  containerPort: 80